<!DOCTYPE html>
<html>
<head>
  <title>Velvet Cuts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #000;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .product {
      background: #1c1c1c;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
    }

    .product h3 {
      margin: 0 0 10px 0;
    }

    .price {
      color: gold;
      font-weight: bold;
    }

    button {
      background: gold;
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .cart {
      background: #000;
      padding: 15px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    .checkout-btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>VELVET CUTS</header>

<div class="container" id="products"></div>

<div class="cart">
  <div id="cartItems"></div>
  <div id="total"></div>
  <button class="checkout-btn" onclick="checkout()">Place Order via WhatsApp</button>
</div>

<script>
  const products = [
    { name: "Premium Biryani Cut", price: 1200 },
    { name: "Mutton Chops", price: 1400 },
    { name: "Boneless Curry Cut", price: 1300 }
  ];

  let cart = [];

  function displayProducts() {
    const container = document.getElementById("products");

    products.forEach((product, index) => {
      container.innerHTML += `
        <div class="product">
          <h3>${product.name}</h3>
          <p class="price">₹${product.price} per kg</p>
          <button onclick="addToCart(${index})">Add to Cart</button>
        </div>
      `;
    });
  }

  function addToCart(index) {
    cart.push(products[index]);
    updateCart();
  }

  function updateCart() {
    const cartDiv = document.getElementById("cartItems");
    const totalDiv = document.getElementById("total");

    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
      cartDiv.innerHTML += `<div>${item.name} - ₹${item.price}</div>`;
      total += item.price;
    });

    totalDiv.innerHTML = `<strong>Total: ₹${total}</strong>`;
  }

  function checkout() {
    if (cart.length === 0) {
      alert("Cart is empty");
      return;
    }

    let message = "Hi Velvet Cuts, I want to order:%0A";
    let total = 0;

    cart.forEach(item => {
      message += `- ${item.name} - ₹${item.price}%0A`;
      total += item.price;
    });

    message += `%0ATotal: ₹${total}`;

    const phoneNumber = "919392986027"; // Replace with your WhatsApp number
    window.open(`https://wa.me/${phoneNumber}?text=${message}`);
  }

  displayProducts();
</script>

</body>
</html>
